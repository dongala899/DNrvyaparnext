<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNR Vyapar — Vyapar Made Easy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }

    .splash-content {
      text-align: center;
      animation: fadeIn 0.8s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-container {
      margin-bottom: 30px;
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-container img {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    .app-name {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
      color: #f8fafc;
    }

    .tagline {
      font-size: 1.1rem;
      font-weight: 400;
      opacity: 0.8;
      margin-bottom: 40px;
      color: #cbd5e1;
    }

    .loading-bar {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin: 0 auto;
    }

    .loading-progress {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes loading {
      0% {
        width: 0%;
        margin-left: 0;
      }
      50% {
        width: 60%;
        margin-left: 40%;
      }
      100% {
        width: 0%;
        margin-left: 100%;
      }
    }

    .loading-text {
      margin-top: 20px;
      font-size: 0.85rem;
      opacity: 0.7;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="splash-content">
    <div class="logo-container">
      <img src="assets/logo.svg" alt="DNR Vyapar Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'font-size:4rem;font-weight:900;color:#3b82f6\'>DNR</div>';">
    </div>
    <div class="app-name">Digital Net Register</div>
    <div class="tagline">Vyapar Made Easy</div>
    <div class="loading-bar">
      <div class="loading-progress"></div>
    </div>
    <div class="loading-text">Loading application...</div>
  </div>
</body>
</html>
